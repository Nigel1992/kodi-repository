- name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Force add the entire addons directory to include .zip and .xml files
          git add --force repository.nigel1992/addons/
          
          # Stage any other changes in the repo folder
          git add repository.nigel1992/
          
          git commit -m "Auto-update addon files (including zips)" || echo "No changes to commit"
          git push
